# CI Pipeline -- Choka Dashboard
#
# Lint, type-check, and test on every push/PR.
# Build and deploy to S3 + CloudFront on merge to main.
#
# Action pins (all full 40-char commit SHAs):
#   actions/checkout@v6.0.2                          de0fac2e4500dabe0009e67214ff5f5447ce83dd
#   actions/setup-node@v4.4.0                        1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a
#   aws-actions/configure-aws-credentials@v6.0.0     8df5847569e6427dd6c4fb1cf565c83acfa8afa7

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - demo
          - prod

permissions:
  id-token: write
  contents: read
  packages: read

env:
  AWS_REGION: ap-southeast-2
  NODE_VERSION: "22"
  PNPM_VERSION: "9"
  TOFU_VERSION: "1.9.0"

jobs:

  # ---------------------------------------------------------------------------
  # Job 1: lint-and-typecheck
  # ---------------------------------------------------------------------------
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup pnpm
        run: corepack enable && corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Set up Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
          registry-url: https://npm.pkg.github.com
          scope: '@chokaau'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint (eslint)
        run: pnpm lint

      - name: Type check (tsc)
        run: pnpm typecheck

  # ---------------------------------------------------------------------------
  # Job 2: test
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup pnpm
        run: corepack enable && corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Set up Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
          registry-url: https://npm.pkg.github.com
          scope: '@chokaau'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run tests with coverage
        run: pnpm test
        env:
          VITE_COGNITO_USER_POOL_ID: test-pool-id
          VITE_COGNITO_CLIENT_ID: test-client-id
          VITE_API_BASE_URL: /api

  # ---------------------------------------------------------------------------
  # Job 3: infra-outputs
  # Reads OpenTofu outputs from the infrastructure repo to inject into build.
  # ---------------------------------------------------------------------------
  infra-outputs:
    name: Read Infra Outputs
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    permissions:
      id-token: write
      contents: read
    outputs:
      cognito_user_pool_id: ${{ steps.outputs.outputs.cognito_user_pool_id }}
      cognito_client_id: ${{ steps.outputs.outputs.cognito_client_id }}
      spa_s3_bucket_name: ${{ steps.outputs.outputs.spa_s3_bucket_name }}
      cloudfront_distribution_id: ${{ steps.outputs.outputs.cloudfront_distribution_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7
        with:
          role-to-assume: arn:aws:iam::737923405927:role/choka-deploy-${{ inputs.environment || 'dev' }}
          aws-region: ap-southeast-2

      - name: Read tofu outputs
        id: outputs
        working-directory: infra
        run: |
          ENV="${{ inputs.environment || 'dev' }}"
          tofu init -input=false -backend-config="key=dashboard/${ENV}/terraform.tfstate"
          if tofu output -json > /tmp/outputs.json 2>/dev/null; then
            echo "cognito_user_pool_id=$(jq -r '.cognito_user_pool_id.value // empty' /tmp/outputs.json)" >> "$GITHUB_OUTPUT"
            echo "cognito_client_id=$(jq -r '.cognito_client_id.value // empty' /tmp/outputs.json)" >> "$GITHUB_OUTPUT"
            echo "spa_s3_bucket_name=$(jq -r '.spa_s3_bucket_name.value // empty' /tmp/outputs.json)" >> "$GITHUB_OUTPUT"
            echo "cloudfront_distribution_id=$(jq -r '.cloudfront_distribution_id.value // empty' /tmp/outputs.json)" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Infra not bootstrapped for ${ENV} — outputs unavailable"
          fi

  # ---------------------------------------------------------------------------
  # Job 4: build-and-deploy
  # Runs only on push to main, after lint-and-typecheck, test, and infra-outputs pass.
  # Builds the Vite SPA and deploys to S3 + CloudFront.
  # ---------------------------------------------------------------------------
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test, infra-outputs]
    if: >-
      always()
      && needs.lint-and-typecheck.result == 'success'
      && needs.test.result == 'success'
      && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
    environment: ${{ inputs.environment || 'dev' }}
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: web

    steps:
      - name: Validate dispatch branch
        if: github.event_name == 'workflow_dispatch' && inputs.environment != 'dev' && github.ref != 'refs/heads/main'
        run: |
          echo "::error::Deploying to ${{ inputs.environment }} requires the main branch. Current ref: ${{ github.ref }}"
          exit 1

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup pnpm
        run: corepack enable && corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Set up Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
          registry-url: https://npm.pkg.github.com
          scope: '@chokaau'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: pnpm build
        env:
          VITE_API_BASE_URL: /api
          VITE_COGNITO_USER_POOL_ID: ${{ needs.infra-outputs.outputs.cognito_user_pool_id || vars.COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ needs.infra-outputs.outputs.cognito_client_id || vars.COGNITO_CLIENT_ID }}

      - name: Verify build output
        shell: bash
        working-directory: web
        run: |
          set -euo pipefail
          if [ ! -f dist/index.html ]; then
            echo "ERROR: dist/index.html not found -- build failed" >&2
            exit 1
          fi
          ASSET_COUNT=$(find dist/assets -type f | wc -l)
          echo "Build output: ${ASSET_COUNT} assets in dist/assets/"
          if [ "${ASSET_COUNT}" -lt 1 ]; then
            echo "ERROR: no assets found in dist/assets/" >&2
            exit 1
          fi
          # Size gate: SPA bundle should be under 5MB total
          TOTAL_SIZE=$(du -sb dist/ | cut -f1)
          MAX_SIZE=5242880
          echo "Total bundle size: ${TOTAL_SIZE} bytes (limit: ${MAX_SIZE})"
          if [ "${TOTAL_SIZE}" -gt "${MAX_SIZE}" ]; then
            echo "ERROR: bundle size ${TOTAL_SIZE} exceeds 5MB limit" >&2
            exit 1
          fi
          echo "PASS: build output verified"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7
        with:
          role-to-assume: arn:aws:iam::737923405927:role/choka-deploy-${{ inputs.environment || 'dev' }}
          aws-region: ap-southeast-2

      - name: Deploy to S3 (tiered cache headers)
        shell: bash
        working-directory: web
        env:
          S3_BUCKET: ${{ needs.infra-outputs.outputs.spa_s3_bucket_name || vars.DASHBOARD_S3_BUCKET }}
        run: |
          set -euo pipefail

          # Hashed assets: 1-year cache, immutable
          aws s3 sync dist/assets/ "s3://${S3_BUCKET}/assets/" \
            --cache-control "public, max-age=31536000, immutable" \
            --delete

          # index.html: no-cache (always revalidate)
          aws s3 cp dist/index.html "s3://${S3_BUCKET}/index.html" \
            --cache-control "public, max-age=0, must-revalidate"

          # Other root files (favicon, robots.txt, etc): short cache
          for f in dist/*; do
            [ -f "$f" ] || continue
            BASENAME=$(basename "$f")
            [ "$BASENAME" = "index.html" ] && continue
            aws s3 cp "$f" "s3://${S3_BUCKET}/${BASENAME}" \
              --cache-control "public, max-age=300"
          done

          echo "S3 sync complete"

      - name: Invalidate CloudFront cache
        shell: bash
        env:
          DISTRIBUTION_ID: ${{ needs.infra-outputs.outputs.cloudfront_distribution_id || vars.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          set -euo pipefail
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id "${DISTRIBUTION_ID}" \
            --paths "/index.html" \
            --query 'Invalidation.Id' \
            --output text)
          echo "CloudFront invalidation created: ${INVALIDATION_ID}"

          # Wait for invalidation to complete (max 120s, 12 × 10s)
          for i in $(seq 1 12); do
            STATUS=$(aws cloudfront get-invalidation \
              --distribution-id "${DISTRIBUTION_ID}" \
              --id "${INVALIDATION_ID}" \
              --query 'Invalidation.Status' \
              --output text)
            if [ "${STATUS}" = "Completed" ]; then
              echo "Invalidation completed"
              break
            fi
            echo "Invalidation status: ${STATUS} (attempt ${i}/12)"
            sleep 10
          done

      - name: Write job summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Dashboard Deploy Summary"
            echo ""
            echo "**Commit:** \`${GITHUB_SHA::7}\`"
            echo "**S3 Bucket:** \`${{ needs.infra-outputs.outputs.spa_s3_bucket_name || vars.DASHBOARD_S3_BUCKET }}\`"
            echo "**Distribution:** \`${{ needs.infra-outputs.outputs.cloudfront_distribution_id || vars.CLOUDFRONT_DISTRIBUTION_ID }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
