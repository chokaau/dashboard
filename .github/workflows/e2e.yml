# E2E smoke test — story-4-6
#
# Runs the Playwright smoke test against the deployed dev environment
# (https://app.choka.dev). Triggered manually or daily at 06:00 AEST (20:00 UTC).
#
# Secrets required in this repository:
#   E2E_USERNAME — Cognito test user email
#   E2E_PASSWORD — Cognito test user password
#
# On failure the job creates a GitHub issue with label "incident" so the
# on-call engineer is notified (see runbook docs/runbooks/choka-dashboard-api.md).

name: E2E Smoke Test

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL to test against (defaults to https://app.choka.dev)"
        required: false
        default: "https://app.choka.dev"
  schedule:
    # Daily at 06:00 AEST (20:00 UTC)
    - cron: "0 20 * * *"

jobs:
  e2e:
    name: Smoke test — ${{ github.event.inputs.base_url || 'https://app.choka.dev' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: dashboard/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: dashboard
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: dashboard
        run: pnpm exec playwright install chromium --with-deps

      - name: Run E2E smoke test
        working-directory: dashboard
        env:
          E2E_USERNAME: ${{ secrets.E2E_USERNAME }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          E2E_BASE_URL: ${{ github.event.inputs.base_url || 'https://app.choka.dev' }}
          CI: "true"
        run: pnpm e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: dashboard/playwright-report/
          retention-days: 7

      - name: Create incident issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[incident] E2E smoke test failed — ${new Date().toISOString().slice(0,10)}`,
              body: `## E2E Smoke Test Failure\n\nThe daily smoke test against \`${process.env.E2E_BASE_URL || 'https://app.choka.dev'}\` failed.\n\n**Run:** ${runUrl}\n\nSee the [runbook](docs/runbooks/choka-dashboard-api.md) for triage steps.`,
              labels: ['incident'],
            });
