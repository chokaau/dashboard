# E2E smoke test — story-4-6
#
# Runs the Playwright smoke test against the deployed dev environment
# (https://app.choka.dev). Triggered manually or daily at 06:00 AEST (20:00 UTC).
#
# Secrets required in this repository:
#   E2E_USERNAME — Cognito test user email
#   E2E_PASSWORD — Cognito test user password
#
# Consecutive-failure logic: a GitHub Issue with labels "incident,automated" is
# auto-created only after TWO consecutive daily schedule failures. A
# workflow_dispatch failure always creates an issue immediately (manual
# invocations signal deliberate investigation).
# The failure counter is stored as a GitHub Actions cache key
# (e2e-failure-count/<date>) so it resets naturally each calendar day.

name: E2E Smoke Test

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL to test against (defaults to https://app.choka.dev)"
        required: false
        default: "https://app.choka.dev"
  schedule:
    # Daily at 06:00 AEST (20:00 UTC)
    - cron: "0 20 * * *"

jobs:
  e2e:
    name: Smoke test — ${{ github.event.inputs.base_url || 'https://app.choka.dev' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: web
        run: pnpm exec playwright install chromium --with-deps

      - name: Run E2E smoke test
        working-directory: web
        env:
          E2E_USERNAME: ${{ secrets.E2E_USERNAME }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          E2E_BASE_URL: ${{ github.event.inputs.base_url || 'https://app.choka.dev' }}
          CI: "true"
        run: pnpm e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

      # ------------------------------------------------------------------
      # Consecutive-failure auto-issue logic (AC-6)
      #
      # Strategy: use a GitHub Actions cache entry as a "failure counter".
      # Cache key format: e2e-failure-count-YYYY-MM-DD-N
      # On each failure we probe for N=1 then N=2. If N=1 exists, this is
      # the second failure → create the issue. Otherwise write the N=1 key.
      # On success: write a "success" key that overrides any failure counter
      # (cache restore is key-based so a fresh success always wins next run).
      #
      # workflow_dispatch failures always create an issue immediately
      # (engineers invoking manually expect instant feedback).
      # ------------------------------------------------------------------

      - name: Check consecutive failure count (schedule only)
        id: failure_check
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const cacheKey1 = `e2e-failure-count-${today}-1`;
            const cacheKey2 = `e2e-failure-count-${today}-2`;

            // Query existing caches for today
            const { data: caches } = await github.rest.actions.getActionsCacheList({
              owner: context.repo.owner,
              repo: context.repo.repo,
              key: `e2e-failure-count-${today}`,
              per_page: 10,
            });

            const keys = caches.actions_caches.map(c => c.key);
            const hasFirst = keys.some(k => k === cacheKey1);

            if (hasFirst) {
              // Second consecutive failure — create the incident issue
              core.setOutput('create_issue', 'true');
              core.setOutput('cache_key', cacheKey2);
            } else {
              // First failure — record it, wait for next run
              core.setOutput('create_issue', 'false');
              core.setOutput('cache_key', cacheKey1);
            }

      - name: Record failure counter in cache (schedule only)
        if: failure() && github.event_name == 'schedule' && steps.failure_check.outputs.cache_key != ''
        uses: actions/cache/save@v4
        with:
          path: /dev/null
          key: ${{ steps.failure_check.outputs.cache_key }}

      - name: Create incident issue on second consecutive daily failure
        if: failure() && github.event_name == 'schedule' && steps.failure_check.outputs.create_issue == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const baseUrl = process.env.E2E_BASE_URL || 'https://app.choka.dev';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[incident] E2E smoke test failed 2 days in a row — ${new Date().toISOString().slice(0,10)}`,
              body: `## E2E Smoke Test Consecutive Failure\n\nThe daily smoke test against \`${baseUrl}\` has failed for **two consecutive days**.\n\n**Latest failing run:** ${runUrl}\n\nSee the [runbook](docs/runbooks/choka-dashboard-api.md) for triage steps.`,
              labels: ['incident', 'automated'],
            });
        env:
          E2E_BASE_URL: ${{ github.event.inputs.base_url || 'https://app.choka.dev' }}

      - name: Create incident issue on workflow_dispatch failure
        if: failure() && github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const baseUrl = process.env.E2E_BASE_URL || 'https://app.choka.dev';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[incident] E2E smoke test failed — ${new Date().toISOString().slice(0,10)}`,
              body: `## E2E Smoke Test Failure (Manual Run)\n\nThe smoke test against \`${baseUrl}\` failed on a manual \`workflow_dispatch\` invocation.\n\n**Run:** ${runUrl}\n\nSee the [runbook](docs/runbooks/choka-dashboard-api.md) for triage steps.`,
              labels: ['incident', 'automated'],
            });
        env:
          E2E_BASE_URL: ${{ github.event.inputs.base_url || 'https://app.choka.dev' }}
